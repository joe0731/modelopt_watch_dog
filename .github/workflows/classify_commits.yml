name: Classify Model-Optimizer MRs

on:
  schedule:
    # run daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'number of days to look back for merged PRs'
        required: false
        default: '7'

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout watchdog repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run classification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: |
          python scripts/classify_mr.py --lookback-days "$LOOKBACK_DAYS"

      - name: Generate monthly archives
        run: |
          python scripts/generate_archives.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ README.md archives/ tags_archives/
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: update changelog $(date -u +%Y-%m-%d)"
            git push
          fi
